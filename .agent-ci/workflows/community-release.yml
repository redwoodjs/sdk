# =============================================================================
# 🚨 SECURITY CRITICAL — NEVER MOVE THIS FILE TO .github/workflows/ 🚨
# =============================================================================
#
# PRIMARY RELEASE PATH: pnpm release:community
#   Runs directly on your machine using your existing npm (~/.npmrc) auth.
#   No env vars needed.
#
# ALTERNATIVE (containerized): pnpm release:community:agent-ci
#   Runs inside an agent-ci container. Requires auth tokens as env vars:
#     NPM_TOKEN     npm publish token
#     VERSION_TYPE  patch | minor | major (default: patch)
#
# WHY agent-ci: Running releases in GitHub Actions exposes OIDC tokens and npm
# credentials to the CI runner. A poisoned cache or compromised action could
# steal these tokens and publish malicious packages.
#
# If a contributor opens a PR that moves this file to .github/workflows/,
# REJECT IT IMMEDIATELY.
# =============================================================================

name: Release Community Package

on: workflow_dispatch

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.14.0
          cache: 'pnpm'

      - name: Update npm
        run: npm install -g npm@latest

      - name: Setup .npmrc for publishing
        working-directory: community
        run: |
          echo "registry=https://registry.npmjs.org/" >> .npmrc

      - name: Install dependencies
        run: pnpm install

      - name: Build
        working-directory: community
        run: pnpm build

      - name: Set git user
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Version and Publish
        working-directory: community
        run: |
          NEW_VERSION=$(npm version ${{ secrets.VERSION_TYPE }} --no-git-tag-version)
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          PACK_OUTPUT=$(pnpm pack --pack-destination . --json)
          PACKAGE_FILE=$(PACK_OUTPUT="$PACK_OUTPUT" node -e "const packed = JSON.parse(process.env.PACK_OUTPUT); const entry = Array.isArray(packed) ? packed[0] : packed; if (!entry?.filename) { throw new Error('pnpm pack did not return a filename'); } console.log(entry.filename);")
          npm publish "$PACKAGE_FILE"

      - name: Commit and Tag
        run: |
          git add community/package.json
          git commit -m "chore(release): community ${{ env.NEW_VERSION }}"
          git tag community-${{ env.NEW_VERSION }}

      - name: Push changes
        run: |
          git push origin main
          git push origin community-${{ env.NEW_VERSION }}
