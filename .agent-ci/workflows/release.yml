# =============================================================================
# 🚨 SECURITY CRITICAL — NEVER MOVE THIS FILE TO .github/workflows/ 🚨
# =============================================================================
#
# This workflow publishes npm packages. It MUST ONLY be run locally via
# agent-ci by maintainers with publish permissions.
#
# WHY: Running releases in GitHub Actions exposes OIDC tokens and npm
# credentials to the CI runner. A poisoned cache or compromised action
# could steal these tokens and publish malicious packages (TanStack-style
# supply chain attack).
#
# HOW TO RUN:
#   VERSION_TYPE=canary npx agent-ci run --workflow .agent-ci/workflows/release.yml
#
# Parameters are passed via shell environment variables (read as secrets by agent-ci):
#   VERSION_TYPE        patch | minor | explicit | test | canary (default: patch)
#   VERSION             Explicit version string (required when VERSION_TYPE=explicit)
#   CREATE_GH_RELEASE   true | false (default: true)
#   SKIP_SMOKE_TESTS    true | false (default: false)
#
# REQUIREMENTS:
#   - You must have npm publish permissions for the @redwoodjs scope
#   - Your npm token must be in .env.agent-ci or your shell environment
#   - Your GitHub token (for creating releases) must also be available
#
# If a contributor opens a PR that moves this file to .github/workflows/,
# REJECT IT IMMEDIATELY.
# =============================================================================

name: Release

on: workflow_dispatch

permissions:
  id-token: write
  contents: write
  actions: write

jobs:
  release:
    if: |
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/next' ||
      secrets.VERSION_TYPE == 'test' ||
      secrets.VERSION_TYPE == 'canary'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # We need to fetch all history for semver to work correctly and to push changes.
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN_FOR_RELEASES }}

      - name: Set up Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.14.0
          # Cache intentionally disabled: a poisoned Actions cache from a
          # pull_request_target run could otherwise be restored here under
          # id-token: write and GH_TOKEN_FOR_RELEASES.

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install

      - name: Setup .npmrc for publishing
        working-directory: sdk
        run: |
          echo "registry=https://registry.npmjs.org/" >> .npmrc

      - name: Run release script
        id: release_script
        working-directory: sdk
        run: |
          COMMAND="./scripts/release.sh ${{ secrets.VERSION_TYPE }}"
          if [[ "${{ secrets.VERSION_TYPE }}" == "explicit" ]]; then
            if [[ -z "${{ secrets.VERSION }}" ]]; then
              echo "::error::The 'version' input is required when 'version_type' is 'explicit'."
              exit 1
            fi
            COMMAND="$COMMAND --version ${{ secrets.VERSION }}"
          elif [[ -n "${{ secrets.VERSION }}" ]]; then
            echo "::error::The 'version' input can only be used when 'version_type' is 'explicit'."
            exit 1
          fi
          if [[ "${{ secrets.SKIP_SMOKE_TESTS }}" == "true" ]]; then
            COMMAND="$COMMAND --skip-smoke-tests"
          fi
          echo "Running command: $COMMAND"
          eval $COMMAND

      - name: Create GitHub Release
        if: success() && secrets.CREATE_GH_RELEASE != 'false'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN_FOR_RELEASES }}
        run: |
          FLAGS="--generate-notes"
          VERSION_TYPE="${{ secrets.VERSION_TYPE }}"
          VERSION="${{ secrets.VERSION }}"

          if [[ "$VERSION_TYPE" == "patch" || "$VERSION_TYPE" == "minor" || "$VERSION_TYPE" == "beta" ]]; then
            FLAGS="$FLAGS --latest"
          elif [[ "$VERSION_TYPE" == "explicit" ]]; then
            # For explicit versions, we check the version string to determine if it's a pre-release
            if [[ "$VERSION" == *"-beta."* ]]; then
              FLAGS="$FLAGS --latest"
            elif [[ "$VERSION" == *"-"* ]]; then
              FLAGS="$FLAGS --prerelease"
            else
              FLAGS="$FLAGS --latest"
            fi
          elif [[ "$VERSION_TYPE" == "test" || "$VERSION_TYPE" == "canary" ]]; then
            FLAGS="$FLAGS --prerelease"
          fi

          echo "Creating GitHub release for tag ${{ env.TAG_NAME }} with flags: $FLAGS"
          gh release create ${{ env.TAG_NAME }} $FLAGS


      - name: Prune node_modules for artifact upload
        if: failure() && steps.release_script.outputs.project-dir
        run: |
          echo "Pruning node_modules to reduce artifact size..."
          find ${{ steps.release_script.outputs.project-dir }}/node_modules -mindepth 1 -maxdepth 1 -not -name "rwsdk" -exec rm -rf {} +
          echo "Pruning complete."

      - name: Upload logs on failure
        if: failure() && steps.release_script.outputs.project-dir
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: smoke-test-failure-logs
          path: ${{ steps.release_script.outputs.project-dir }}

      - name: Upload smoke test artifacts
        if: always() && steps.release_script.outputs.project-dir
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-smoke-test-artifacts
          path: ${{ steps.release_script.outputs.project-dir }}/artifacts
          retention-days: 7
