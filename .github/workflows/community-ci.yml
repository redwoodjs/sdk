name: Community CI

on:
  push:
    branches:
      - main
    paths:
      - 'community/**'
      - '.github/workflows/community-ci.yml'
  pull_request:
    paths:
      - 'community/**'
      - '.github/workflows/community-ci.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && github.run_id || github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

# Cloudflare secrets are scoped to the specific steps that need them rather
# than the workflow env, so that earlier steps running PR-author code
# (install/build) do not have them in process scope.

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    # Runs on all PRs (including forks), push to main, and workflow_dispatch.
    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Enable Corepack
        run: corepack enable
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.14.0
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install
      - name: Build SDK
        run: |
          cd sdk
          pnpm build
      - name: Run Unit Tests
        run: |
          cd community
          pnpm test

  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          echo 'matrix={"include":[{"os":"ubuntu-latest","package-manager":"pnpm"}]}' >> $GITHUB_OUTPUT

  community-e2e-dev:
    needs: setup-matrix
    name: Community E2E Tests (Dev)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    timeout-minutes: 60
    env:
      DEBUG: rwsdk:e2e:*
      MAX_RETRIES: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_call') && '10' || '1' }}
      RWSDK_SKIP_DEPLOY: "1"
      RWSDK_SEQUENTIAL: "1"

    # Runs on all PRs (including forks), push to main, and workflow_dispatch.
    # No secrets needed — RWSDK_SKIP_DEPLOY ensures only dev server tests run.

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.14.0
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build SDK
        run: |
          cd sdk
          pnpm build

      - name: Build Community Pkg
        run: |
          cd community
          pnpm build

      - name: Run Community E2E Tests (Dev)
        run: |
          cd community
          pnpm test:e2e

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: community-e2e-dev-artifacts-${{ matrix.os }}-${{ matrix.package-manager }}
          path: |
            /tmp/*-e2e-test-*
            community/playground/**/node_modules/.cache/wrangler
          retention-days: 7

  community-e2e-deploy:
    needs: setup-matrix
    name: Community E2E Tests (Deploy)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    timeout-minutes: 60
    env:
      DEBUG: rwsdk:e2e:*
      MAX_RETRIES: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_call') && '10' || '1' }}
      RWSDK_SKIP_DEV: "1"
      RWSDK_SEQUENTIAL: "1"

    # Only runs on push to main / workflow_dispatch. Never on pull_request.
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.14.0
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build SDK
        run: |
          cd sdk
          pnpm build

      - name: Build Community Pkg
        run: |
          cd community
          pnpm build

      - name: Run Community E2E Tests (Deploy)
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          cd community
          pnpm test:e2e

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: community-e2e-deploy-artifacts-${{ matrix.os }}-${{ matrix.package-manager }}
          path: |
            /tmp/*-e2e-test-*
            community/playground/**/node_modules/.cache/wrangler
          retention-days: 7
