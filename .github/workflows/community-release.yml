name: Release Community Package

on:
  workflow_dispatch:
    inputs:
      type:
        description: 'Release type'
        required: true
        type: choice
        default: 'patch'
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@eae0cfeb286e66ffb5155f1a79b90583a127a68b # v2 branch head as of 2026-05-12

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.14.0
          # Cache intentionally disabled: a poisoned Actions cache from a
          # pull_request_target run could otherwise be restored here under
          # publish credentials.

      - name: Update npm
        run: npm install -g npm@latest

      - name: Setup .npmrc for publishing
        working-directory: community
        run: |
          echo "registry=https://registry.npmjs.org/" >> .npmrc

      - name: Install dependencies
        run: pnpm install

      - name: Build
        working-directory: community
        run: pnpm build

      - name: Set git user
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Version and Publish
        working-directory: community
        run: |
          NEW_VERSION=$(npm version ${{ inputs.type }} --no-git-tag-version)
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          PACK_OUTPUT=$(pnpm pack --pack-destination . --json)
          PACKAGE_FILE=$(PACK_OUTPUT="$PACK_OUTPUT" node -e "const packed = JSON.parse(process.env.PACK_OUTPUT); const entry = Array.isArray(packed) ? packed[0] : packed; if (!entry?.filename) { throw new Error('pnpm pack did not return a filename'); } console.log(entry.filename);")
          npm publish "$PACKAGE_FILE"

      - name: Commit and Tag
        run: |
          git add community/package.json
          git commit -m "chore(release): community ${{ env.NEW_VERSION }}"
          git tag community-${{ env.NEW_VERSION }}

      - name: Push changes
        run: |
          git push origin main
          git push origin community-${{ env.NEW_VERSION }}
